# Atmos Nairobi daily AQI digest — posts to Bluesky every morning 07:00 EAT.
# Set up 6 Jul 2026 per Kari's decision (sustainable autopilot, no laptop needed).
# Secrets required (repo Settings > Secrets and variables > Actions):
#   AIRQO_TOKEN, BSKY_HANDLE, BSKY_APP_PASSWORD
name: daily-digest
on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC = 07:00 Nairobi
  workflow_dispatch: {}     # allows a manual test run from the Actions tab
permissions:
  contents: write           # to commit the digest log
concurrency: daily-digest
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build and post digest
        env:
          AIRQO_TOKEN: ${{ secrets.AIRQO_TOKEN }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: node scripts/post-digest.js
      - name: Commit log
        run: |
          git config user.name "atmos-digest"
          git config user.email "actions@users.noreply.github.com"
          git add logs/digest-log.txt || true
          git diff --cached --quiet || git commit -m "digest log $(date -u +%F)"
          git push
